<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Status boards</title>
  <style>
    :root {
      color-scheme: light dark;
      --ground:#f4f6f8; --panel:#ffffff; --panel-2:#f8fafc;
      --ink:#1a1f27; --ink-soft:#5b6672; --ink-faint:#8a94a1;
      --hair:#e3e7ec; --accent:#4b53c8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ground:#101319; --panel:#181c23; --panel-2:#1e232b;
        --ink:#e8ebf0; --ink-soft:#9aa3af; --ink-faint:#6c7683;
        --hair:#2a303a; --accent:#8b90f2;
      }
    }
    :root[data-theme="light"] { --ground:#f4f6f8; --panel:#ffffff; --panel-2:#f8fafc; --ink:#1a1f27; --ink-soft:#5b6672; --ink-faint:#8a94a1; --hair:#e3e7ec; --accent:#4b53c8; }
    :root[data-theme="dark"]  { --ground:#101319; --panel:#181c23; --panel-2:#1e232b; --ink:#e8ebf0; --ink-soft:#9aa3af; --ink-faint:#6c7683; --hair:#2a303a; --accent:#8b90f2; }

    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      background: var(--ground); color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6; -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 46rem; margin: 0 auto; padding: clamp(2rem, 6vw, 4.5rem) clamp(1.1rem, 4vw, 2rem) 4rem; }
    .eyebrow { font-family: ui-monospace, Menlo, monospace; font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin: 0 0 0.6rem; }
    h1 { font-size: clamp(1.8rem, 5vw, 2.4rem); line-height: 1.12; letter-spacing: -0.02em; margin: 0 0 0.5rem; font-weight: 700; }
    .lede { color: var(--ink-soft); font-size: 1.02rem; margin: 0 0 2.2rem; }

    .cards { display: grid; gap: 0.9rem; list-style: none; margin: 0; padding: 0; }
    .card a {
      display: block; text-decoration: none; color: inherit;
      background: var(--panel); border: 1px solid var(--hair); border-radius: 14px;
      padding: 1.15rem 1.3rem; transition: border-color .15s, transform .15s, background .15s;
    }
    .card a:hover { border-color: var(--accent); transform: translateY(-1px); background: var(--panel-2); }
    .card a:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
    .card .row { display: flex; align-items: baseline; justify-content: space-between; gap: 0.75rem; }
    .card .title { font-weight: 650; font-size: 1.08rem; }
    .card .arrow { color: var(--ink-faint); }
    .card .desc { color: var(--ink-soft); font-size: 0.94rem; margin: 0.35rem 0 0; }
    .card .meta { font-family: ui-monospace, Menlo, monospace; font-size: 0.75rem; color: var(--ink-faint); margin-top: 0.6rem; }

    .empty, .err { color: var(--ink-faint); font-size: 0.95rem; padding: 1rem 0; }
    .err { color: #c0392b; }
    footer { margin-top: 3rem; padding-top: 1.4rem; border-top: 1px solid var(--hair); font-size: 0.82rem; color: var(--ink-faint); }
    footer code { font-family: ui-monospace, Menlo, monospace; background: var(--panel-2); border: 1px solid var(--hair); border-radius: 5px; padding: 0.08rem 0.35rem; font-size: 0.9em; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">PLACEHOLDER</p>
      <h1>Status boards</h1>
      <p class="lede">Live project status, self-hosted. Pick one to view.</p>
    </header>

    <ul class="cards" id="cards"><li class="empty">Loading…</li></ul>

    <footer>
      Built with <a href="https://github.com/jhoughjr/statusgen" target="_blank" rel="noopener">statusgen</a>. Each board lives under its own path (e.g. <code>/demo/</code>) — drop a <code>board.json</code> + shell in a folder and add a line to <code>status.json</code>.
    </footer>
  </div>

  <script>
    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }
    function fmtDate(d) {
      if (!d) return "";
      const t = Date.parse(d);
      return Number.isNaN(t) ? escapeHtml(d) : new Date(t).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }
    fetch("status.json", { cache: "no-cache" })
      .then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then((list) => {
        const el = document.getElementById("cards");
        if (!Array.isArray(list) || list.length === 0) { el.innerHTML = '<li class="empty">No boards yet.</li>'; return; }
        el.innerHTML = list.map((b) => `
          <li class="card">
            <a href="${escapeHtml(b.slug)}/">
              <div class="row"><span class="title">${escapeHtml(b.title ?? b.slug)}</span><span class="arrow">→</span></div>
              ${b.description ? `<p class="desc">${escapeHtml(b.description)}</p>` : ""}
              ${b.updated ? `<div class="meta">Updated ${fmtDate(b.updated)}</div>` : ""}
            </a>
          </li>`).join("");
      })
      .catch(() => { document.getElementById("cards").innerHTML = '<li class="err">Couldn’t load status.json.</li>'; });
  </script>
</body>
</html>
